services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_L2BG_API_BASE_URL: ${VITE_L2BG_API_BASE_URL:-/api}
      L2BG_VITE_PROXY_TARGET: ${L2BG_VITE_PROXY_TARGET:-http://backend:8080}
    ports:
      - "${L2BG_FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

  db-init:
    image: postgres:17-alpine
    environment:
      L2BG_DATABASE_URL: ${L2BG_DATABASE_URL:-postgres://l2bg:l2bg_local_dev@postgres:5432/l2bg?sslmode=disable}
    volumes:
      - ./ops/db-init:/workspace:ro
    command:
      - sh
      - /workspace/run.sh
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: go run ./cmd/server
    environment:
      L2BG_BACKEND_ADDR: ${L2BG_BACKEND_ADDR:-0.0.0.0:8080}
      L2BG_DATABASE_URL: ${L2BG_DATABASE_URL:-postgres://l2bg:l2bg_local_dev@postgres:5432/l2bg?sslmode=disable}
      L2BG_TEST_DATABASE_URL: ${L2BG_TEST_DATABASE_URL:-postgres://l2bg:l2bg_local_dev@postgres:5432/l2bg?sslmode=disable}
      L2BG_PUBLIC_WS_URL: ${L2BG_PUBLIC_WS_URL:-ws://localhost:5173/api/v1/gameplay/ws}
      L2BG_ALLOWED_ORIGINS: ${L2BG_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      L2BG_AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${L2BG_AUTH_RATE_LIMIT_MAX_ATTEMPTS:-}
      L2BG_AUTH_RATE_LIMIT_WINDOW: ${L2BG_AUTH_RATE_LIMIT_WINDOW:-}
      L2BG_ATTACH_RATE_LIMIT_MAX_ATTEMPTS: ${L2BG_ATTACH_RATE_LIMIT_MAX_ATTEMPTS:-}
      L2BG_ATTACH_RATE_LIMIT_WINDOW: ${L2BG_ATTACH_RATE_LIMIT_WINDOW:-}
      L2BG_INTERNAL_AUDIT_ENABLED: ${L2BG_INTERNAL_AUDIT_ENABLED:-}
      L2BG_INTERNAL_AUDIT_TOKEN: ${L2BG_INTERNAL_AUDIT_TOKEN:-}
      L2BG_SERVER_INSTANCE_ID: ${L2BG_SERVER_INSTANCE_ID:-backend-compose-1}
      L2BG_SESSION_LEASE_DURATION: ${L2BG_SESSION_LEASE_DURATION:-30s}
      L2BG_SESSION_LEASE_RENEW_INTERVAL: ${L2BG_SESSION_LEASE_RENEW_INTERVAL:-10s}
      L2BG_SESSION_ATTACH_TOKEN_TTL: ${L2BG_SESSION_ATTACH_TOKEN_TTL:-5m}
      L2BG_GAMEPLAY_EVENT_POLL_INTERVAL: ${L2BG_GAMEPLAY_EVENT_POLL_INTERVAL:-250ms}
      L2BG_GAMEPLAY_EVENT_CLAIM_LEASE: ${L2BG_GAMEPLAY_EVENT_CLAIM_LEASE:-5s}
      L2BG_GAMEPLAY_EVENT_RETRY_DELAY: ${L2BG_GAMEPLAY_EVENT_RETRY_DELAY:-500ms}
      L2BG_GAMEPLAY_EVENT_RETENTION: ${L2BG_GAMEPLAY_EVENT_RETENTION:-24h}
      L2BG_GAMEPLAY_EVENT_CLEANUP_INTERVAL: ${L2BG_GAMEPLAY_EVENT_CLEANUP_INTERVAL:-10m}
      L2BG_GAMEPLAY_EVENT_BATCH_SIZE: ${L2BG_GAMEPLAY_EVENT_BATCH_SIZE:-32}
      L2BG_GAMEPLAY_EVENT_MAX_RETRIES: ${L2BG_GAMEPLAY_EVENT_MAX_RETRIES:-5}
    ports:
      - "${L2BG_BACKEND_PORT:-8080}:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${L2BG_POSTGRES_DB:-l2bg}
      POSTGRES_USER: ${L2BG_POSTGRES_USER:-l2bg}
      POSTGRES_PASSWORD: ${L2BG_POSTGRES_PASSWORD:-l2bg_local_dev}
    ports:
      - "${L2BG_POSTGRES_PORT:-5432}:5432"
    volumes:
      - l2bg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  l2bg_postgres_data:
